robot: "g1"  # Robot name, "go2", "b2", "b2w", "h1", "go2w", "g1"
robot_scene: "scene_29dof.xml" # Robot scene, /unitree_robots/[robot]/scene.xml

domain_id: 0  # Domain id (0 matches real-robot defaults; safe on iface lo since loopback isn't routable)
interface: "lo" # Interface

use_joystick: 1 # Simulate Unitree WirelessController (1 = enable joystick input source)
joystick_type: "dds" # "xbox" / "switch" = USB gamepad; "dds" = receive WirelessController_ on rt/wirelesscontroller
joystick_device: "/dev/input/js0" # Device path
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy

print_scene_information: 1 # Print link, joint and sensors information of robot

enable_elastic_band: 1 # Virtual spring band — suspends H1/G1 during init so the FSM can transition before gravity wins. MuJoCo-window keys: 9=toggle, 7/UP=raise, 8/DOWN=lower, Backspace=reset

# Tilting platform (only active when the scene has platform_pitch/platform_roll joints, e.g. scene_platform.xml)
platform_mode: "off"   # "off" | "remote" (drive via rt/platform_cmd) | "boat" (server-side sine wave)
platform_kp: 800.0     # PD stiffness on platform hinges (Nm/rad). The convenience script bumps this to 3000.
platform_kd: 400.0     # PD damping — set to ~critical (kd = 2·√(kp·I), I≈50 kg·m² for plate+G1)
platform_default_max_rate_deg_s: 30.0  # default rate limit for "remote" mode (overridable per-cmd)
platform_boat:
  pitch_amp_deg: 3.0     # gentler than the old 5° default — boat now rocks calmly
  pitch_period_s: 6.0    # slower than the old 4 s
  roll_amp_deg: 4.0      # gentler than the old 7°
  roll_period_s: 8.0     # slower than the old 3 s
  phase_offset_rad: 1.5707963267948966  # pi/2 — pitch and roll 90° out of phase = circular bobbing
